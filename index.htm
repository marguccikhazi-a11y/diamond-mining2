<style>
    /* ---------- обнуление ---------- */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* ---------- фон страницы ---------- */
    body {
        font-family: 'DejaVu Sans Mono', monospace, serif;
        background-color: #d9eaf7;
        color: #1a2c3e;
    }

    /* ---------- шапка на весь экран ---------- */
    .fullscreen-header {
        position: relative;
        width: 100%;
        height: 100vh;
        background-image: url('мирный.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .header-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.45);
        z-index: 1;
    }

    .header-content {
        position: relative;
        z-index: 2;
        color: white;
        width: 100%;
        padding: 20px;
    }

    .header-content h1 {
        font-size: 3rem;
        color: white;
        text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        border-bottom: none;
        margin-bottom: 20px;
    }

    /* ---------- навигация ---------- */
    .fullscreen-header nav {
        background-color: transparent;
        display: flex;
        justify-content: center;
    }

    .fullscreen-header #nav-list {
        display: inline-flex;
        gap: 0;
        padding: 0;
        margin: 0;
        background: rgba(26, 74, 118, 0.85);
        border-radius: 40px;
        backdrop-filter: blur(4px);
        list-style: none;
    }

    .fullscreen-header #nav-list li {
        margin: 0;
        padding: 0;
    }

    .fullscreen-header #nav-list a {
        display: inline-block;
        padding: 12px 28px;
        color: white;
        text-decoration: none;
        font-size: 1rem;
        font-weight: 700;
        text-shadow: 0 0 2px black;
        transition: background 0.2s;
        border-radius: 40px;
    }

    .fullscreen-header #nav-list a:hover {
        background-color: #0f4a6f;
    }

    /* ---------- основной контент ---------- */
    .content-wrapper {
        background-color: rgba(230, 242, 250, 0.95);
        border-top: 3px solid #1e5a7a;
    }

    main {
        width: 1200px;
        margin: 0 auto;
        padding: 30px 40px;
    }

    h2 {
        font-size: 3rem;
        color: #0a4b6e;
        margin-top: 30px;
        margin-bottom: 14px;
        padding-bottom: 6px;
        border-bottom: 2px solid #1e5a7a;
    }

    p {
        font-size: 1.3rem;
        line-height: 1.6;
        margin-bottom: 14px;
        color: #1c3b4f;
    }

    /* ---------- блок "технологический процесс" ---------- */
    #mesto {
        border: 3px solid #1e5a7a;
        background-color: #f0f8ff;
        border-radius: 10px;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 20px;
        margin-left: -50px;
        margin-right: -50px;
        width: calc(100% + 50px);
        padding: 15px;
    }

    #mesto > div:first-child {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
    }

    #mesto > div:first-child img {
        width: 850px;
        border-radius: 10px;
        height: auto;
    }

    #mesto > div:first-child p {
        text-align: center;
        margin-top: 5px;
        font-style: italic;
        color: #2c6b8f;
        font-size: 1rem;
    }

    #mesto > p {
        flex: 1;
        min-width: 200px;
    }

    a {
        text-decoration: none;
    }

    /* ---------- схема (svg) ---------- */
    #scheme-container {
        overflow-x: auto;
        margin: 20px 0;
    }

    svg {
        display: block;
        margin: 0 auto;
        min-width: 1010px;
    }

    svg a {
        cursor: pointer;
        transition: all 0.2s ease;
    }
    svg a:hover rect {
        fill: #c2e0f0;
        stroke: #0f4a6f;
    }
    svg a:hover text:first-of-type {
        fill: #0f4a6f;
        font-weight: bold;
    }
    svg a:hover + text,
    svg a:hover ~ text {
        fill: #1e5a7a;
    }

    /* ---------- описание этапов ---------- */
    #ponyatiya {
        border: 2px dashed #2b7a9c;
        background-color: #eef5fc;
        padding: 20px 28px;
        margin: 24px 0;
    }

    ol, ul {
        padding-left: 1.5rem;
    }

    li {
        font-size: 1.2rem;
        line-height: 1.6;
        margin-bottom: 6px;
        color: #1a3b4e;
    }

    #ponyatiya li {
        overflow: auto;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 1px solid #bbd4f0;
    }

    #ponyatiya li a {
        font-weight: bold;
        color: #1a3b4e;
        cursor: pointer;
    }
    #ponyatiya li a:hover {
        color: #1e5a7a;
        text-decoration: none;
    }

    #ponyatiya li figure {
        float: right;
        margin: 0 0 15px 25px;
        width: 700px;
        text-align: center;
    }
    #ponyatiya li figure img {
        width: 100%;
        height: auto;
        border-radius: 8px;
        display: block;
    }

    #ponyatiya li figure figcaption {
        font-size: 1rem;
        font-style: italic;
        color: #2c6b8f;
        margin-top: 6px;
    }

    /* ---------- блок "фото" ---------- */
    #image-placeholder {
        width: 100%;
        min-height: 180px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        margin: 20px 0;
        padding: 10px 0;
    }

    #image-placeholder > div {
        display: inline-block;
        width: 200px;
        text-align: center;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        padding: 5px;
    }

    #image-placeholder > div a {
        display: block;
        cursor: pointer;
    }

    #image-placeholder > div a img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 6px;
        display: block;
    }

    #image-placeholder > div p {
        display: none;
        margin: 8px 0 4px 0;
        font-size: 0.9rem;
        font-style: italic;
        color: #2c6b8f;
    }

    /* модальные окна – открываются по :target */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 20px;
    }

    .modal:target {
        display: flex;
    }

    .modal img {
        max-width: 90vw;
        max-height: 80vh;
        object-fit: contain;
        border-radius: 8px;
    }

    .modal p {
        color: white;
        font-size: 1.5rem;
        font-style: italic;
        margin-top: 20px;
    }

    .modal .close {
        position: absolute;
        top: 30px;
        right: 40px;
        font-size: 2.5rem;
        color: white;
        text-decoration: none;
        font-weight: bold;
        cursor: pointer;
    }
    .modal .close:hover {
        color: #bbb;
    }

    /* ---------- футер ---------- */
    footer {
        border-top: 3px solid #1e5a7a;
        background-color: #e3f0f9;
        text-align: center;
        padding: 20px;
    }
    #footer-almazyky {
        font-size: 1rem;
        color: #1e5a7a;
        font-weight: 700;
        letter-spacing: 5px;
    }
</style>
